name: Reusable Build

on:
  workflow_call:
    inputs:
      node-version:
        required: true
        type: string
    outputs:
      build-status:
        description: "Whether build passed"
        value: ${{ jobs.build.outputs.build-status }}

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    outputs:
      build-status: ${{ steps.build-step.outputs.status }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test

      - name: Build app
        id: build-step
        run: |
          npm run build
          echo "status=success" >> $GITHUB_OUTPUT

      - name: List build output          # 👈 shows what folder was created
        run: ls -la
        working-directory: frontend/build   # check if build/ exists

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-artifact
          path: frontend/build/          # ✅ must exist after npm run build