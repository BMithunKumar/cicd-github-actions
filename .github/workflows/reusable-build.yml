name: Reusable Build

on:
  workflow_call:
    inputs:
      node_version:
        required: true
        type: string
    secrets: 
      NPM_TOKEN: 
        required: false
    outputs:
      build-status:
        description: "Whether build passed"
        value: ${{ jobs.build.outputs.build-status }}

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      build-status: ${{ steps.build-step.outputs.status }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node_version }}

      - name: Install & Test
        run: |
          cd frontend
          npm install
        env: 
          NODE_AUTH_TOKEN: ${{secrets.NPM_TOKEN}}

      - name: Run test
        run:  |
          cd frontend
          npm test
        
      - name: Build app
        id: build-step
        run: |
          cd frontend
          npm run build
          echo "status=success" >> $GITHUB_OUTPUT
          echo "✅ Build complete — build/ folder ready"

      - name: Upload dist as artifact        # 👈 saves dist/ for deploy job
        uses: actions/upload-artifact@v4
        with:
          name: build-artifact
          path: frontend/build/