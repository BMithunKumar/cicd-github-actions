name: CI/CD Pipeline

on:
  push:
    branches: [master]

jobs:

  build:
    uses: ./.github/workflows/reusable-build.yml
    with:
      node-version: '18'

  deploy:
    runs-on: ubuntu-latest
    needs: build                         

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: build-artifact          
          path: dist/

      - name: Show files
        run: ls dist/

      - name: Deploy
        run: echo "🚀 Deploying..."